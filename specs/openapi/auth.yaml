openapi: 3.1.0
info:
  title: FreteCheck Auth API
  version: 0.1.0
  description: Endpoints de autenticação e gerenciamento de sessão

servers:
  - url: http://localhost:3001/api/v1
    description: Development

paths:
  /auth/register:
    post:
      summary: Cadastrar novo usuário
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: João da Silva
              phone: "+5511999999999"
              role: MOTORISTA
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      summary: Login com email/senha
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/whatsapp/send-otp:
    post:
      summary: Enviar OTP via WhatsApp
      operationId: sendWhatsappOtp
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  pattern: '^\+55[1-9][0-9]{9,10}$'
                  example: '+5511999999999'
      responses:
        '200':
          description: OTP enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/whatsapp/verify:
    post:
      summary: Verificar OTP e autenticar
      operationId: verifyWhatsappOtp
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhatsappVerifyRequest'
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      summary: Renovar access token
      operationId: refreshToken
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  schemas:
    RegisterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+55[1-9][0-9]{9,10}$'
        cpf:
          type: string
          pattern: '^\d{3}\.?\d{3}\.?\d{3}-?\d{2}$'
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
        empresaId:
          type: string

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+55[1-9][0-9]{9,10}$'
        password:
          type: string
          minLength: 8

    WhatsappVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          pattern: '^\+55[1-9][0-9]{9,10}$'
        code:
          type: string
          pattern: '^\d{6}$'

    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Segundos até expiração do access token

    AuthUser:
      type: object
      required: [id, name, role, whatsappVerified]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        empresaId:
          type: string
        whatsappVerified:
          type: boolean

    LoginResponse:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        tokens:
          $ref: '#/components/schemas/AuthTokens'

    Role:
      type: string
      enum:
        - MOTORISTA
        - TRANSPORTADORA_ADMIN
        - TRANSPORTADORA_OPERACIONAL
        - TRANSPORTADORA_FINANCEIRO
        - EMBARCADOR
        - PLATFORM_ADMIN
        - API_CONSUMER

    Error:
      type: object
      required: [statusCode, message, error, timestamp, path]
      properties:
        statusCode:
          type: integer
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

  responses:
    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Recurso já existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

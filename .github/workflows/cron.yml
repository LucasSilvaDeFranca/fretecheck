name: Daily CRON Jobs

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC — recálculo de scores
    - cron: '0 4 * * *'   # 04:00 UTC — fuzzing (Schemathesis)
    - cron: '0 5 * * 1'   # 05:00 UTC às segundas — auditoria de deps
  workflow_dispatch:

jobs:
  # Recálculo de scores é tratado pelo ScheduleModule do NestJS em produção.
  # Este job garante que o endpoint de saúde responde após cada deploy.
  healthcheck:
    name: Production Healthcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        run: |
          curl -sf ${{ secrets.API_URL }}/health || echo "API health check failed"

  fuzzing:
    name: API Fuzzing (Schemathesis)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Run Schemathesis
        run: |
          pip install schemathesis
          schemathesis run specs/openapi/auth.yaml \
            --base-url=${{ secrets.API_URL }} \
            --checks=all \
            --max-examples=50 2>/dev/null || true

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 5 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '10'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
